<!doctype html>
<html>
  <head>
    <style>
      body {
        background: #202a3a; /* 背景色。暗い青 */
      }

      /* =============================================
         @keyframes: 動きの設計図
         「fall」という名前をつけた（自分で決めていい）
         from（開始）→ to（終了）をCSSが自動で補完して動かす
         ============================================= */
      @keyframes fall {
        from { transform: translateY(-50px); } /* 画面より少し上からスタート */
        to   { transform: translateY(800px); } /* 画面より下まで落とす */
        /* translateY = 縦方向に動かす。topよりGPUで処理されて滑らか */
      }

      /* =============================================
         .rain-container: 全雨粒を入れる箱
         この箱ごと傾けることで、中の雨粒も全部斜めになる
         rotate(-5deg) = 左に5度傾く = 右から左へ流れる雨
         ============================================= */
      .rain-container {
        transform: rotate(-5deg);
      }

      /* =============================================
         .rain: 雨粒1本の見た目（全本共通）
         個別の設定（横位置・速さ・長さ）はJavaScriptで上書きする
         ============================================= */
      .rain {
        position: absolute; /* 好きな座標に置けるモード */
        top: 0;             /* 上端から開始（translateYで動くので初期値は0でいい） */
        width: 2px;         /* 雨粒の太さ */
        height: 40px;       /* 雨粒の長さ（JavaScriptでランダムに上書きされる） */

        /* linear-gradient: 上から下へのグラデーション
           transparent = 完全透明（上端）
           rgba(180, 210, 255, 0.6) = 水色っぽい半透明（下端）
           → 上が薄く下がはっきり見えて雨粒らしくなる */
        background: linear-gradient(to bottom, transparent, rgba(180, 210, 255, 0.6));

        /* animation: 設計図の名前  時間           速さのカーブ  繰り返し
                      fall          3s（デフォルト） linear        infinite
           ※時間はJavaScriptで雨粒ごとにランダムに上書きされる */
        animation: fall 3s linear infinite;
      }

    </style>
  </head>

  <body>
    <!--　HTMLのコメントはこうやって書く　-->
    <!-- rain-containerがJavaScriptで雨粒を追加する対象。idで名前をつけて特定する -->
    <div class="rain-container" id="rain-container"></div>

    <script>
      // idが"rain-container"の要素を取得して変数に入れる
      var container = document.getElementById('rain-container');

      // for文: i=0 から始めて i<100 になるまで繰り返す → 100回ループ
      for (var i = 0; i < 100; i++) {

        // divを1個作る（まだ画面には出ない）
        var drop = document.createElement('div');

        // 作ったdivに .rain クラスをつける（CSSの見た目が適用される）
        drop.className = 'rain';

        // Math.random() = 0以上1未満のランダムな小数
        // * 1280 で 0〜1280 の範囲になる → 画面幅いっぱいにバラまく
        drop.style.left = (Math.random() * 1280) + 'px';

        // マイナスのdelayにすることで、開いた瞬間から各雨粒が
        // すでに違う高さから降っているように見える（0にすると全部同時スタートになる）
        drop.style.animationDelay = -(Math.random()) + 's';

        // 長さをランダムに: 10px〜40pxの範囲
        // 10 + (0〜30) = 10〜40
        drop.style.height = (10 + Math.random() * 30) + 'px';

        // 速さをランダムに: 0.4秒〜0.9秒の範囲
        // 速さがバラバラだと奥行き感が出る
        drop.style.animationDuration = (0.4 + Math.random() * 0.5) + 's';

        // 作った雨粒をコンテナの中に追加する（ここで初めて画面に出る）
        container.appendChild(drop);
      }
    </script>
  </body>
</html>
